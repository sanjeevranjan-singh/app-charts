{{- if .Values.sockShop.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    litmuschaos.io/chaos: "true"
  labels:
    app: sock-shop
    name: catalogue
  name: catalogue
  namespace: {{ include "sock-shop-litmus.sockShopNamespace" . }}
spec:
  replicas: {{ .Values.sockShop.catalogue.replicas }}
  selector:
    matchLabels:
      app: sock-shop
      name: catalogue
  template:
    metadata:
      labels:
        app: sock-shop
        name: catalogue
    spec:
      containers:
      - image: {{ .Values.sockShop.catalogue.image }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        name: catalogue
        ports:
        - containerPort: 80
          protocol: TCP
        resources: {}
        startupProbe:
          httpGet:
            path: /health
            port: 80
          # 60 * 3s = 180s grace for slow startup; liveness/readiness then
          # take over without their own long initialDelaySeconds.
          failureThreshold: 60
          periodSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 3
        securityContext:
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - all
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
{{- end }}
