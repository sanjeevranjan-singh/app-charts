{{- if .Values.sockShop.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    litmuschaos.io/chaos: "true"
  labels:
    app: sock-shop
    name: payment
  name: payment
  namespace: {{ include "sock-shop-litmus.sockShopNamespace" . }}
spec:
  replicas: {{ .Values.sockShop.payment.replicas }}
  selector:
    matchLabels:
      app: sock-shop
      name: payment
  template:
    metadata:
      labels:
        app: sock-shop
        name: payment
    spec:
      containers:
      - image: {{ .Values.sockShop.payment.image }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        name: payment
        ports:
        - containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 50Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - all
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
        startupProbe:
          httpGet:
            path: /health
            port: 80
          # 60 * 3s = 180s grace for slow startup.
          failureThreshold: 60
          periodSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 3
{{- end }}
