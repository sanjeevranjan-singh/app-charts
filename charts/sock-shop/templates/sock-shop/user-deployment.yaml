{{- if .Values.sockShop.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    litmuschaos.io/chaos: "true"
  labels:
    app: sock-shop
    name: user
  name: user
  namespace: {{ include "sock-shop-litmus.sockShopNamespace" . }}
spec:
  replicas: {{ .Values.sockShop.user.replicas }}
  selector:
    matchLabels:
      app: sock-shop
      name: user
  template:
    metadata:
      labels:
        app: sock-shop
        name: user
    spec:
      containers:
      - env:
        - name: MONGO_HOST
          value: user-db:27017
        image: {{ .Values.sockShop.user.image }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        name: user
        ports:
        - containerPort: 80
          protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: 80
          # 60 * 3s = 180s grace for slow startup.
          failureThreshold: 60
          periodSeconds: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 0
          periodSeconds: 3
        securityContext:
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - all
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
{{- end }}
